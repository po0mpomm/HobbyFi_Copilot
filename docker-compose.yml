version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: hobbyfi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hobbyfi_copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: hobbyfi_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
